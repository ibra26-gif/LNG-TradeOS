name: Fetch ENTSOG Pipeline Data

on:
  schedule:
    # Run twice daily: 07:00 and 19:00 UTC
    # ENTSOG publishes with 3-24h delay, so 2x/day keeps data fresh
    - cron: '0 7,19 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch ENTSOG data
        run: python3 scripts/fetch_entsog.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/pipeline_daily.json 2>/dev/null || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline_daily.json
          git commit -m "Update pipeline data $(date -u +%Y-%m-%d)"
          git push
