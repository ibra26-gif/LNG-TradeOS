name: EEX gas curves daily refresh

on:
  schedule:
    # Weekdays 08:00 UTC. The heartbeat runs one hour later and fails if this
    # workbook has not moved recently enough.
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: eex-gas-curves
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl

      - name: Refresh EEX gas curve workbook
        run: python3 scripts/fetch_eex_gas_curves.py

      - name: Run financial freshness regression
        run: node scripts/test_financial_curve_freshness_regression.js

      - name: Commit workbook if changed
        run: |
          set -e
          if git diff --quiet -- data/EEX_Gas_Curves.xlsx; then
            echo "No EEX workbook change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/EEX_Gas_Curves.xlsx
          LATEST=$(python3 - <<'PY'
from scripts.fetch_eex_gas_curves import load_existing
d=load_existing()
dates=sorted({ds for hub in d.values() for ds in hub})
print(dates[-1] if dates else "source-gap")
PY
)
          git commit -m "data: refresh eex gas curves ($LATEST)"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push EEX gas curve update"
          exit 1
