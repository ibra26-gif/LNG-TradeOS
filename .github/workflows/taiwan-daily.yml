name: Taiwan gas balance weekly refresh

on:
  schedule:
    # Sunday 10:00 Europe/London during BST. GitHub cron is UTC.
    - cron: "0 9 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: taiwan-gas-balance
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Taiwan gas balance
        run: python3 scripts/fetch_taiwan_gas_balance.py

      - name: Commit data if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taiwan_gas_balance.json
          if git diff --cached --quiet; then
            echo "No Taiwan gas balance change."
            exit 0
          fi
          LATEST=$(python3 -c "import json;print(json.load(open('data/taiwan_gas_balance.json'))['latest_month'] or 'source-gap')")
          git commit -m "data: taiwan gas balance refresh ($LATEST)"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push Taiwan gas balance update"
          exit 1
