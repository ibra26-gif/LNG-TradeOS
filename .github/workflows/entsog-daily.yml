name: Fetch ENTSOG Pipeline Data

on:
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch ENTSOG data
        run: python3 scripts/fetch_entsog.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/pipeline_daily.json 2>/dev/null || echo "changed=true" >> $
