name: Fetch ENTSOG Pipeline Data

on:
  schedule:
    # Daily at 06:00 UTC (after ENTSOG publishes D-1 data ~04:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch ENTSOG data
        run: python fetch_entsog.py
        env:
          OUTPUT_DIR: data

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline_daily.json
          git diff --cached --quiet || git commit -m "chore: update pipeline_daily.json [$(date -u +%Y-%m-%d)]"
          git push
